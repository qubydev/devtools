<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tools | malay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Courier New', Courier, monospace; }
    </style>
</head>
<body class="bg-[#0f0f0f] text-gray-300 min-h-screen flex flex-col items-center justify-center p-6 selection:bg-pink-500 selection:text-white">
    
    <div class="max-w-lg w-full">
        <header class="mb-12">
            <h1 class="text-2xl text-pink-400 mb-2"><i class="fa-solid fa-terminal mr-2"></i>~/tools</h1>
            <p class="text-sm text-gray-500">a minimal collection of web utilities and micro-tools.</p>
        </header>

        <main class="mb-16">
            <h2 class="text-xs text-gray-500 mb-4 border-b border-gray-800 pb-2 uppercase tracking-widest">directory</h2>
            
            <ul class="flex flex-col gap-3">
                <li>
                    <a href="/savefile" class="group flex items-center justify-between p-3 bg-[#161616] border border-gray-800 rounded hover:border-pink-400 hover:bg-[#1a1a1a] transition-all">
                        <div class="flex items-center gap-3">
                            <i class="fa-solid fa-file-code text-gray-500 group-hover:text-pink-400 transition-colors"></i>
                            <span class="text-sm font-bold text-gray-200 group-hover:text-pink-100">/savefile</span>
                        </div>
                        <span class="text-xs text-gray-500 group-hover:text-gray-400">browser-based code pad</span>
                    </a>
                </li>
                <li>
                    <a href="/wordcounter" class="group flex items-center justify-between p-3 bg-[#161616] border border-gray-800 rounded hover:border-pink-400 hover:bg-[#1a1a1a] transition-all">
                        <div class="flex items-center gap-3">
                            <i class="fa-solid fa-file-code text-gray-500 group-hover:text-pink-400 transition-colors"></i>
                            <span class="text-sm font-bold text-gray-200 group-hover:text-pink-100">/wordcounter</span>
                        </div>
                        <span class="text-xs text-gray-500 group-hover:text-gray-400">browser-based code pad</span>
                    </a>
                </li>
            </ul>
        </main>

        <footer class="text-xs text-gray-600 flex items-center gap-2">
            <span>made by</span>
            <a href="https://qubydev.vercel.app" target="_blank" class="text-gray-400 hover:text-pink-400 underline decoration-gray-800 underline-offset-4 transition-colors">malay</a>
        </footer>
    </div>

</body>
</html>

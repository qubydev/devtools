<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word & Character Counter</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased h-screen w-screen flex items-center justify-center p-4 sm:p-8">

    <div class="w-full h-full max-w-screen-2xl flex flex-col bg-white rounded-2xl shadow-xl overflow-hidden">
        
        <div class="bg-indigo-600 px-6 py-4 shrink-0">
            <h1 class="text-2xl font-bold text-white tracking-wide">Word & Char Counter</h1>
            <p class="text-indigo-200 text-sm mt-1">Paste your text below to get instant word and character counts.</p>
        </div>

        <div class="p-6 flex-grow flex flex-col">
            <textarea 
                id="textInput" 
                class="w-full flex-grow p-4 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 resize-none text-gray-700 leading-relaxed transition-shadow text-lg"
                placeholder="Start typing or paste your huge text here..."
            ></textarea>
        </div>

        <div class="bg-gray-100 px-6 py-4 flex flex-col sm:flex-row items-center justify-between gap-4 border-t border-gray-200 shrink-0">
            
            <div class="flex space-x-8">
                <div class="flex flex-col items-center sm:items-start">
                    <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Words</span>
                    <span id="wordCount" class="text-3xl font-bold text-indigo-600">0</span>
                </div>
                
                <div class="flex flex-col items-center sm:items-start">
                    <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Characters</span>
                    <span id="charCount" class="text-3xl font-bold text-emerald-600">0</span>
                </div>
            </div>

            <button 
                id="clearBtn" 
                class="px-6 py-2.5 bg-red-500 hover:bg-red-600 text-white font-medium rounded-lg shadow-sm transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-red-400 focus:ring-offset-2 focus:ring-offset-gray-100"
            >
                Clear Text
            </button>
            
        </div>
    </div>

    <script>
        const textInput = document.getElementById('textInput');
        const wordCountDisplay = document.getElementById('wordCount');
        const charCountDisplay = document.getElementById('charCount');
        const clearBtn = document.getElementById('clearBtn');

        function updateCounts() {
            const text = textInput.value;
            const charCount = text.length;
            const words = text.trim().split(/\s+/).filter(word => word.length > 0);
            const wordCount = words.length;

            charCountDisplay.textContent = charCount.toLocaleString();
            wordCountDisplay.textContent = wordCount.toLocaleString();
        }

        textInput.addEventListener('input', updateCounts);

        clearBtn.addEventListener('click', () => {
            textInput.value = '';
            updateCounts();
            textInput.focus();
        });
    </script>
</body>
</html>
